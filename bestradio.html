<script type="text/javascript">
const player = document.getElementById('audio-player');
const playlistItems = document.querySelectorAll('.track');
const trackTitle = document.getElementById('track-title');
const trackStatus = document.getElementById('track-status');
const sleepTimerSelect = document.getElementById('sleep-timer');
let sleepTimeout = null;

playlistItems.forEach(item => {
  item.addEventListener('click', () => {
    playlistItems.forEach(i => i.classList.remove('active'));
    item.classList.add('active');

    const streamUrl = item.getAttribute('data-src');
    const isLive = item.getAttribute('data-type') === 'live';
    
    player.src = streamUrl;
    trackTitle.innerText = item.querySelector('span').innerText;
    trackStatus.innerText = isLive ? "Streaming Live..." : "Playing Track";

    player.play();
  });
});

// Sleep Timer Logic
sleepTimerSelect.addEventListener('change', (e) => {
  const minutes = parseInt(e.target.value);

  if (sleepTimeout) {
    clearTimeout(sleepTimeout);
    sleepTimeout = null;
  }

  if (minutes > 0) {
    const selectedText = sleepTimerSelect.options[sleepTimerSelect.selectedIndex].text;
    trackStatus.innerText = `Sleep timer set for ${selectedText}`;
    
    sleepTimeout = setTimeout(() => {
      player.pause();
      trackStatus.innerText = "Music stopped (Sleep Timer)";
      sleepTimerSelect.value = "0";
    }, minutes * 60 * 1000);
  } else {
    trackStatus.innerText = "Playing Track";
  }
});

// Error handling for dead streams
player.onerror = () => {
  trackStatus.innerText = "Error: Stream Unavailable";
  trackStatus.style.color = "#f43f5e";
};
</script>

<script>
    document.addEventListener("DOMContentLoaded", function() {

        );
        elementsToRemove.forEach(function(element) {

            }
        });
    });
</script>
<script>
        let deferredPrompt;

        // 1. Register Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then((reg) => console.log('Service worker registered.', reg))
                    .catch((err) => console.log('Service worker registration failed.', err));
            });
        }

        // 2. Capture the install prompt event
        window.addEventListener('beforeinstallprompt', (e) => {
            // Prevent the mini-infobar from appearing on mobile
            e.preventDefault();
            // Stash the event so it can be triggered later
            deferredPrompt = e;
            // Show the install button
            const installButton = document.getElementById('install-button');
            installButton.style.display = 'inline-block';

            installButton.addEventListener('click', () => {
                // Show the prompt
                deferredPrompt.prompt();
                // Wait for the user to respond to the prompt
                deferredPrompt.userChoice.then((choiceResult) => {
                    if (choiceResult.outcome === 'accepted') {
                        console.log('User accepted the install prompt');
                    }
                    deferredPrompt = null;
                });
            });
        });

        // 3. Hide button after installation is complete
        window.addEventListener('appinstalled', (evt) => {
            console.log('PWA was successfully installed');
            document.getElementById('install-button').style.display = 'none';
        });
    </script>
    <script type="text/javascript">
    self.addEventListener('install', (e) => {
    e.waitUntil(
    caches.open('pwa-store').then((cache) => {
    return cache.addAll(['/', '/index.html']);
    })
    );
    });
    
    self.addEventListener('fetch', (e) => {
    e.respondWith(
    caches.match(e.request).then((response) => {
    return response || fetch(e.request);
    })
    );
    });
    
    </script>
